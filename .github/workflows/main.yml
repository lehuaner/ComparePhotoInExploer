name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: dotnet publish ComparePhotoInExploer/ComparePhotoInExploer.csproj -c Release -o publish

    - name: Copy release scripts
      run: |
        Copy-Item -Path "release/Install-右键菜单安装.bat" -Destination "publish/"
        Copy-Item -Path "release/Install-右键菜单安装.ps1" -Destination "publish/"
        Copy-Item -Path "release/Uninstall-右键菜单卸载.bat" -Destination "publish/"
        Copy-Item -Path "release/Uninstall-右键菜单卸载.ps1" -Destination "publish/"
        Copy-Item -Path "release/README.txt" -Destination "publish/"

    - name: Create zip archive
      run: |
        $tag = if ($env:GITHUB_REF -match 'refs/tags/(.*)') { $Matches[1] } else { 'dev' }
        Compress-Archive -Path "publish/*" -DestinationPath "ComparePhotoInExploer-$tag.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ComparePhotoInExploer-*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
